<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game Pro</title>
<link rel="stylesheet" href="Css/style.css">
</head>
<body>

<h1>🐍 Snake Game Pro</h1>

<div class="topbar">
    <div>Score: <span id="scoreBox">0</span></div>
    <div>High Score: <span id="highScoreBox">0</span></div>
</div>

<div id="board"></div>

<div class="controls">
    <button onclick="restartGame()">Restart</button>
    <button onclick="togglePause()">Pause</button>
    <button onclick="toggleSound()">Sound On/Off</button>
</div>

<script src="js/index.js"></script>
</body>
</html>
